<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Contar Historia - CTH</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
</head>
<body class="cuerpo-inicio">

    <div class="contenedor-app">
        <nav class="barra-lateral">
            <div class="logo-seccion">
                <img src="img/logo.png" alt="Logo" class="logo-mini">
            </div>

            <ul class="menu-navegacion">
                <li><a href="inicio.html"><i class="bi bi-house-door"></i> Inicio</a></li>
                <li><a href="#"><i class="bi bi-book"></i> Leyendas</a></li>
<li><a href="podcast.html"><i class="bi bi-mic"></i> Podcast</a></li>
                <li><a href="contar.html" class="activo"><i class="bi bi-plus-circle"></i> Contar Historia</a></li>
            </ul>

                    <div class="usuario-seccion">
                <p id="nombreUsuarioCargando" style="color: #9ca3af; text-align: center; font-size: 0.8rem; margin-bottom: 10px;">Cargando...</p>
                <button id="btnCerrarSesion" class="boton-salir">
                    <i class="bi bi-box-arrow-right"></i> Salir
                </button>
            </div>
        </nav>

        <main class="contenido-principal">
            <header class="encabezado-bienvenida">
                <h1>Envía tu Relato</h1>
                <p>Tu historia será revisada por el administrador antes de ser publicada.</p>
            </header>

            <form id="formNuevaHistoria" class="tarjeta-historia">
                <div class="grupo-entrada">
                    <label for="tituloH">Título de la Historia</label>
                    <input type="text" id="tituloH" placeholder="Ej: La Llorona de la carretera" required>
                </div>

                <div class="grupo-entrada">
                    <label for="contenidoH">Tu Relato</label>
                    <textarea id="contenidoH" rows="10" placeholder="Escribe aquí tu experiencia paranormal..." required></textarea>
                </div>

                <div class="grupo-entrada">
                    <label for="urlH">Enlace de Video/Podcast (YouTube o Spotify)</label>
                    <input type="url" id="urlH" placeholder="https://youtube.com/...">
                </div>

                <button type="submit" id="btnEnviar" class="boton-principal">Enviar a Revisión</button>
            </form>
        </main>
    </div>

    <script type="module" src="contar.js"></script>
</body>
</html>
